<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Drawing</title>
</head>
<body>
    <svg width="300" height="300" viewBox="0 0 300 300">
        <!-- Head -->
        <circle cx="150" cy="150" r="80" fill="#FFA500" stroke="#000" stroke-width="2"/>
        
        <!-- Left Ear -->
        <polygon points="100,80 80,30 120,60" fill="#FFA500" stroke="#000" stroke-width="2"/>
        
        <!-- Right Ear -->
        <polygon points="200,80 220,30 180,60" fill="#FFA500" stroke="#000" stroke-width="2"/>
        
        <!-- Left Eye -->
        <circle cx="120" cy="130" r="12" fill="#000"/>
        <circle cx="122" cy="128" r="4" fill="#fff"/>
        
        <!-- Right Eye -->
        <circle cx="180" cy="130" r="12" fill="#000"/>
        <circle cx="182" cy="128" r="4" fill="#fff"/>
        
        <!-- Nose -->
        <polygon points="150,160 145,170 155,170" fill="#FFB6C1"/>
        
        <!-- Mouth -->
        <path d="M 150 170 Q 140 180 130 175" stroke="#000" stroke-width="2" fill="none"/>
        <path d="M 150 170 Q 160 180 170 175" stroke="#000" stroke-width="2" fill="none"/>
    </svg>
</body>
</html>
