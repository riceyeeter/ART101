<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man Budget Edition</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            text-align: center;
        }
        canvas {
            border: 2px solid #0ff;
            background-color: #000;
            display: block;
            margin: 20px auto;
        }
        h1 {
            color: #ffff00;
        }
        p {
            color: #0ff;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <h1>Pac-Man Budget Edition</h1>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <p>Use Arrow Keys to move</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const pacMan = { x: 50, y: 50, size: 20, mouthOpen: true, direction: 0 };
        const pellets = [];
        let score = 0;

        // Initialize pellets
        for (let i = 0; i < 100; i++) {
            pellets.push({ x: Math.random() * (canvas.width - 40) + 20, y: Math.random() * (canvas.height - 40) + 20, eaten: false });
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') pacMan.direction = 0;
            if (e.key === 'ArrowRight') pacMan.direction = 1;
            if (e.key === 'ArrowDown') pacMan.direction = 2;
            if (e.key === 'ArrowLeft') pacMan.direction = 3;
        });

        function drawPacMan() {
            const mouth = pacMan.mouthOpen ? 0.2 : 0;
            const angles = [[mouth, 2 * Math.PI - mouth], [Math.PI / 2 + mouth, Math.PI / 2 - mouth + 2 * Math.PI], [Math.PI + mouth, Math.PI - mouth], [3 * Math.PI / 2 + mouth, 3 * Math.PI / 2 - mouth]];
            const [startAngle, endAngle] = angles[pacMan.direction];

            ctx.fillStyle = '#ffff00';
            ctx.beginPath();
            ctx.arc(pacMan.x, pacMan.y, pacMan.size, startAngle, endAngle);
            ctx.lineTo(pacMan.x, pacMan.y);
            ctx.fill();
        }

        function drawPellets() {
            ctx.fillStyle = '#ffb8ff';
            pellets.forEach(p => {
                if (!p.eaten) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 3, 0, 2 * Math.PI);
                    ctx.fill();
                }
            });
        }

        function update() {
            const speed = 2;
            const [dx, dy] = [[0, -speed], [speed, 0], [0, speed], [-speed, 0]][pacMan.direction];
            pacMan.x = Math.max(pacMan.size, Math.min(canvas.width - pacMan.size, pacMan.x + dx));
            pacMan.y = Math.max(pacMan.size, Math.min(canvas.height - pacMan.size, pacMan.y + dy));

            pellets.forEach(p => {
                if (!p.eaten && Math.hypot(pacMan.x - p.x, pacMan.y - p.y) < pacMan.size + 3) {
                    p.eaten = true;
                    score++;
                }
            });

            pacMan.mouthOpen = !pacMan.mouthOpen;
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawPellets();
            drawPacMan();
            ctx.fillStyle = '#0ff';
            ctx.font = '16px Arial';
            ctx.fillText(`Score: ${score}`, 10, 20);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
